        <h1>Temples of The Church of Jesus Christ of Latter-day Saints</h1>

        <section class="card">
            <figure>
                <figcaption>Salt Lake Temple</figcaption>
                <img src="images/saltlake.jpg" alt="Salt Lake Temple" width="300" >
                <p>The Salt Lake Temple is the largest and most iconic temple of The Church of Jesus Christ of Latter-day Saints. It is located in Salt Lake City, Utah, and was dedicated in 1893. The temple features six spires and intricate stonework, making it a symbol of faith and devotion for members of the church.</p>
            </figure>

            <figure>
                <figcaption>Nairobi Kenya Temple</figcaption>
                <img src="images/nairobi.jpg" alt="Nairobi Kenya Temple" width="300" >
                <p>The Nairobi Kenya Temple is the first LDS temple in East Africa and the ninth in Africa, located in the Mountain View neighborhood. Dedicated by Elder Ulisses Soares on May 18, 2025, the facility serves a growing membership, featuring local Kenyan-inspired, savanna-toned design.</p>
            </figure>

            <figure>
                <figcaption>Johannesburg South Africa Temple</figcaption>
                <img src="images/johannesburg.jpg" alt="Johannesburg South Africa Temple" width="300" >
                <p>The Johannesburg South Africa Temple is a temple of the Church of Jesus Christ of Latter-day Saints located in Parktown, Johannesburg, South Africa. The intent to construct the temple was announced by church president Spencer W. Kimball in April 1981.</p>
            </figure>

            <figure>
                <figcaption>Nauvoo Temple</figcaption>
                <img src="images/nauvoo.jpg" alt="Nauvoo Temple" width="300" >
                <p>Built amidst intense opposition in Illinois. Saints worked diligently to finish it before fleeing, with the building later destroyed by arson and a tornado.</p>
            </figure>
            
            <figure>
                <figcaption>Oklahoma City Oklahoma Temple</figcaption>
                <img src="images/oklahoma.jpg" alt="Oklahoma City Oklahoma Temple" width="300" >
                <p>The Oklahoma City Oklahoma Temple is the 95th operating temple of the Church of Jesus Christ of Latter-day Saints and the first built in the state of Oklahoma. Located in Yukon, a suburb of Oklahoma City.</p>
            </figure>

            <figure>
                <figcaption>Columbus Ohio Temple</figcaption>
                <img src="images/columbus.jpg" alt="Columbus Ohio Temple" width="300" >
                <p>The Columbus Ohio Temple is the 140th operating temple of The Church of Jesus Christ of Latter-day Saints. It is located in Columbus, Ohio, and was dedicated on September 17, 2023. The temple features a modern design with a single spire and serves members in the surrounding area.</p>
            </figure>

            <figure>
                <figcaption>Rome Italy Temple</figcaption>
                <img src="images/rome.jpg" alt="Rome Italy Temple" width="300" >
                <p>The Rome Italy Temple is the 142nd operating temple of The Church of Jesus Christ of Latter-day Saints. It is located in Rome, Italy, and was dedicated on March 19, 2023. The temple features a unique design inspired by ancient Roman architecture and serves members in Italy and surrounding countries.</p>
            </figure>

            <figure>
                <figcaption>San Diego California Temple</figcaption>
                <img src="images/sandiego.jpg" alt="San Diego California Temple" width="300" >
                <p>The San Diego California Temple is the 27th operating temple of The Church of Jesus Christ of Latter-day Saints. It is located in San Diego, California, and was dedicated on April 25, 1993. The temple features a modern design with two spires and serves members in the surrounding area.</p>
            </figure>

            <figure>
                <figcaption>Portland Oregon Temple</figcaption>
                <img src="images/portland.jpg" alt="Portland Oregon Temple" width="300" >
                <p>The Portland Oregon Temple is the 34th operating temple of The Church of Jesus Christ of Latter-day Saints. It is located in Lake Oswego, a suburb of Portland, Oregon, and was dedicated on August 30, 1989. The temple features a modern design with a single spire and serves members in the surrounding area.</p>
            </figure>
