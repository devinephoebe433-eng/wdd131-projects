<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Lyric Review | Devine's Ethereal Lyricist</title>
    <meta name="description" content="Submit your review of lyrics, songs, and musical experiences.">
    <meta name="author" content="Phoebe Devine">

    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>

<body>

    <header>
        <h1>Devine's Ethereal Lyricist</h1>
        <p>Lyric & Song Review Form</p>
    </header>

    <main>
        <form method="get" action="review.html">

            <!-- Song Selection -->
            <select id="product" name="product" required>
                <option value="" disabled selected>Select a Product ...</option>
            </select>


            <!-- Rating -->
            <fieldset>
                <legend>Emotional Impact Rating</legend>

                <input type="radio" id="star1" name="rating" value="1" required>
                <label for="star1">☆</label>

                <input type="radio" id="star2" name="rating" value="2" required>
                <label for="star2">☆☆</label>

                <input type="radio" id="star3" name="rating" value="3" required>
                <label for="star3">☆☆☆</label>

                <input type="radio" id="star4" name="rating" value="4" required>
                <label for="star4">☆☆☆☆</label>

                <input type="radio" id="star5" name="rating" value="5" required>
                <label for="star5">☆☆☆☆☆</label>

            </fieldset>

            <!-- Date -->
            <label for="date">Date You First Heard It</label>
            <input type="date" id="date" name="date" required>

            <!-- Features -->
            <fieldset>
                <legend>What stood out?</legend>

                <input type="checkbox" id="lyrics" name="features" value="Lyrics">
                <label for="lyrics">Lyrics</label>

                <input type="checkbox" id="melody" name="features" value="Melody">
                <label for="melody">Melody</label>

                <input type="checkbox" id="emotion" name="features" value="Emotion">
                <label for="emotion">Emotion</label>

                <input type="checkbox" id="vocals" name="features" value="Vocals">
                <label for="vocals">Vocals</label>

            </fieldset>

            <!-- Review -->
            <label for="review">Your Reflection</label>
            <textarea id="review" name="review"></textarea>

            <!-- Name -->
            <label for="username">Your Name</label>
            <input type="text" id="username" name="username">

            <!-- Submit -->
            <input type="submit" value="Submit Review">

        </form>
    </main>

    <footer>
        <p>&copy; 2026 | Devine's Ethereal Lyricist</p>
    </footer>

</body>

</html>
