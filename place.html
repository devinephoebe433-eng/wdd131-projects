<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>France - Explore the World</title>

    <meta name="description" content="Explore France’s culture, landmarks, and weather. Discover beautiful destinations and travel insights across the country.">

    <meta name="author" content="Nabugobero Devine Phoebe">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/places.css">
    <script src="scripts/places.js" defer></script>
</head>

<body>
    <header>
        <h1>Explore France With Me</h1>
    </header>

    <div class="hero">
        <picture>
            <source srcset="images/hero.webp" media="(min-width: 768px)">
            <img src="images/hero.webp" alt="Paris cityscape with Eiffel Tower and river at sunset" width="1200" height="600" loading="lazy">
        </picture>

        <div class="hero-label">
            <h2>France</h2>
        </div>
    </div>

    <main>
        <section class="data-card card">
            <h3>Place Details</h3>
            <p><strong>Country:</strong> France</p>
            <p><strong>Language:</strong> French</p>
            <p><strong>Currency:</strong> Euro (€)</p>
            <p><strong>Climate:</strong> Temperate</p>
        </section>

        <section class="weather card">
            <h3 class="weather-heading">Weather</h3>
            <img src="images/weather.svg" alt="Weather icon" class="weather-icon-mobile" width="50" height="50">
            
            <div class="weather-details">
                <p><strong>Temperature:</strong> <span id="temp">8</span>°C</p>
                <p><strong>Conditions:</strong> Partly Cloudy</p>
                <p><strong>Wind Speed:</strong> <span id="windspeed">12</span> km/h</p>
                <p><strong>Wind Chill:</strong> <span id="windchill"></span></p>
            </div>
        </section>

        <div class="gallery">
            <figure class="card">
                <img src="images/france-two.webp" alt="Tower in Paris" loading="lazy" width="400" height="300">
                <figcaption>Paris</figcaption>
            </figure>

            <figure class="card">
                <img src="images/france-one.webp" alt="Paris city" loading="lazy" width="400" height="300">
                <figcaption>France</figcaption>
            </figure>

            <figure class="card">
                <img src="images/france-three.webp" alt="Beauty of Paris" loading="lazy" width="400" height="300">
                <figcaption>Beauty Of France</figcaption>
            </figure>
        </div>
    </main>

    <footer>
        <p>&copy; <span id="currentyear"></span> | Nabugobero Devine Phoebe | Uganda</p>
        <p>Last Modified: <span id="lastModified"></span></p>
    </footer>
</body>
</html>
